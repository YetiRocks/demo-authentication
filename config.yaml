name: "Authentication Demo"
app_id: "demo-authentication"
version: "1.0.0"
description: "Role-based access control with Basic, JWT, and OAuth login"
enabled: true
rest: true
graphql: true

schemas:
  - schemas/auth.graphql

dataLoader: data/employees.json

authLoader:
  roles: data/roles.json
  users: data/users.json

static_files:
  path: web
  route: /
  index: index.html
  notFound:
    file: index.html
    statusCode: 200
  build:
    sourceDir: source
    command: npm run build

auth:
  jwt:
    secret: "${JWT_SECRET}"
    accessTtl: 900
    refreshTtl: 604800
  oauth:
    github:
      clientId: "${GITHUB_CLIENT_ID}"
      clientSecret: "${GITHUB_CLIENT_SECRET}"
    google:
      clientId: "${GOOGLE_CLIENT_ID}"
      clientSecret: "${GOOGLE_CLIENT_SECRET}"
    rules:
      - strategy: provider
        pattern: "google"
        role: admin
      - strategy: email
        pattern: "*@mycompany.com"
        role: viewer
      - strategy: provider
        pattern: "github"
        role: viewer