name: "Authentication Demo"
app_id: "demo-authentication"
version: "1.0.0"
description: "Role-based access control with Basic, JWT, and OAuth login"
enabled: true
rest: true
graphql: true

schemas:
  - schemas/auth.graphql

dataLoader: data/*.json

static_files:
  path: web
  route: /
  index: index.html
  notFound:
    file: index.html
    statusCode: 200
  build:
    sourceDir: source
    command: npm run build

extensions:
  - yeti-auth:
      oauth:
        rules:
          - strategy: provider
            pattern: "google"
            role: admin
          - strategy: email
            pattern: "*@mycompany.com"
            role: standard
          - strategy: provider
            pattern: "github"
            role: standard
